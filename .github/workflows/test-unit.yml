name: Unit tests (no Ghidra)

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: pytest -m unit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff (src and tests)
        run: uv run ruff check --no-fix src/ tests/

      - name: Anonymization gate
        run: bash scripts/check-anonymization.sh

      - name: Run unit tests
        run: uv run pytest -m unit -q --timeout=120 --tb=short
