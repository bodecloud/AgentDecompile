name: Test Ghidra 🐉 Extension

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        ghidra-version: ["12.0", "latest"]
    name: Build on Ghidra ${{ matrix.ghidra-version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Set up Java 🍵
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ghidra 🐉
        uses: antoniovazquezblanco/setup-ghidra@v2.1.2
        with:
          version: ${{ matrix.ghidra-version }}
          auth_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Xvfb for headless testing
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          Xvfb :99 -nolisten tcp &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Install PyGhidra from local Ghidra
        run: uv pip install "${GHIDRA_INSTALL_DIR}/Ghidra/Features/PyGhidra/pypkg"

      - name: PyGhidra and MCP import smoke
        env:
          GHIDRA_INSTALL_DIR: ${{ env.GHIDRA_INSTALL_DIR }}
        run: |
          uv run python -c "import pyghidra; print('pyghidra', pyghidra.__version__)"
          uv run python -c "import agentdecompile_cli; print('agentdecompile_cli ok')"
